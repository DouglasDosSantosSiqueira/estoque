<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Estoque Inteligente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📦 Localizador de Estoque</h1>

<h2>🔍 Buscar</h2>
<input type="text" id="busca" placeholder="Digite o item..." oninput="buscarItem(); leituraRapida();">

<h2>📍 Resultado rápido</h2>
<div id="resultado"></div>

<h2>➕ Adicionar Item</h2>
<input type="text" id="prateleira" placeholder="Prateleira (P1 a P8)">
<input type="text" id="bloco" placeholder="Posição (ex: A12)">
<input type="text" id="nome" placeholder="Nome do item">
<button onclick="adicionarItem()">Adicionar</button>

<h2>🗺️ Mapa</h2>
<div id="mapa"></div>

<script src="script.js"></script>
</body>
</html>
