<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Estoque Inteligente - Firebase</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase CDN Modules -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</head>
<body>

<!-- Tela Login -->
<div id="loginScreen" class="login-container">
  <div class="login-card">
    <h2>🔐 Login / Registro</h2>
    
    <!-- Registro -->
    <div class="login-form">
      <h3>➕ Novo Usuário</h3>
      <input type="text" id="regNome" placeholder="Nome completo">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Senha">
      <button onclick="register()">Registrar (Funcionário)</button>
    </div>
    
    <!-- Login -->
    <div class="login-form">
      <h3>📥 Entrar</h3>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <button onclick="logout()">Sair</button>
    </div>
  </div>
</div>

<!-- Main App (escondido até login) -->
<div id="main" style="display: none;">

<h1>📦 Localizador de Estoque</h1>

<h2> Histórico de ações</h2>
<div id="historico"></div>

<br>
<br>

<!-- busca -->
<div class="card">
<h2>🔍 Buscar</h2>
<input type="text" id="busca" class="input-padrao" placeholder="Digite o item..." oninput="buscarItem(); leituraRapida();">
</div>

<!-- Resultado rápido -->
<div class="card">
<h2>📍 Resultado rápido</h2>
<div id="resultado" class="input-padrao"></div>
</div>

<!-- Adicionar item -->
<div class="card">

  <h2>➕ Adicionar Item</h2>

  <div class="grupo-input">
    <input type="text" id="prateleira" class="input-padrao" placeholder="Prateleira (P1 a P8)">
    <input type="text" id="bloco" class="input-padrao" placeholder="Posição (ex: A12)">
    <input type="text" id="nome" class="input-padrao" placeholder="Nome do item">
    <button onclick="adicionarItem()">Adicionar</button>

  </div>

</div>

<h2>🗺️ Mapa</h2>
<div id="mapa"></div>


<script src="script.js"></script>
</body>
</html>
